<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warcraft Web</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
    }
    #game-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
    }
    #hud {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 160px;
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
      border-top: 2px solid #c8a82e;
      display: flex;
      align-items: stretch;
      z-index: 10;
      pointer-events: auto;
    }
    #resource-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 28px;
      background: linear-gradient(to bottom, #1a1a2e, #0f0f23);
      border-bottom: 1px solid #c8a82e;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 24px;
      z-index: 10;
      font-size: 13px;
      color: #e0d6a0;
      pointer-events: auto;
    }
    .resource-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .resource-icon {
      width: 14px;
      height: 14px;
      border-radius: 2px;
    }
    .gold-icon { background: #ffd700; }
    .lumber-icon { background: #8b4513; }
    #minimap-panel {
      width: 200px;
      height: 100%;
      padding: 8px;
      border-right: 1px solid #c8a82e44;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #minimap-canvas {
      image-rendering: pixelated;
    }
    #info-panel {
      flex: 1;
      padding: 8px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    #info-panel .unit-name {
      font-size: 14px;
      font-weight: bold;
      color: #c8a82e;
      margin-bottom: 4px;
    }
    #info-panel .unit-stats {
      font-size: 12px;
      color: #a0a0c0;
    }
    #action-panel {
      width: 200px;
      height: 100%;
      padding: 8px;
      border-left: 1px solid #c8a82e44;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 4px;
    }
    .action-btn {
      background: #2a2a4e;
      border: 1px solid #c8a82e66;
      border-radius: 4px;
      color: #e0d6a0;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 2px;
      padding: 2px;
    }
    .action-btn:hover {
      background: #3a3a6e;
      border-color: #c8a82e;
    }
    .action-btn-active {
      background: #4a3a1e;
      border-color: #ffd700;
      box-shadow: 0 0 4px #ffd70066;
    }
    .order-hotkey {
      font-size: 8px;
      color: #888;
      font-weight: bold;
    }
    .order-name {
      font-size: 10px;
    }
    #selection-box {
      position: absolute;
      border: 1px solid #00ff00;
      background: rgba(0, 255, 0, 0.1);
      pointer-events: none;
      display: none;
      z-index: 5;
    }
    #event-log {
      position: absolute;
      bottom: 170px;
      left: 8px;
      width: 30vw;
      min-width: 280px;
      max-width: 480px;
      max-height: 200px;
      overflow-y: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      pointer-events: none;
      z-index: 9;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 4px;
      padding: 4px 0;
    }
    .event-log-line {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 12px;
      line-height: 1.5;
      padding: 2px 8px;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.9);
      transition: opacity 0.5s ease;
    }
    .event-log-sender {
      font-weight: bold;
      margin-right: 6px;
    }
    .event-log-sender::after {
      content: ':';
    }
    .event-log-msg {
      color: #d0d0e0;
    }
    /* HP bar */
    .hp-bar-container {
      width: 100%;
      height: 8px;
      background: #1a1a2e;
      border: 1px solid #444;
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }
    .hp-bar-fill {
      height: 100%;
      transition: width 0.15s ease;
    }
    /* Production queue */
    .prod-queue {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      align-items: center;
    }
    .prod-queue-item {
      position: relative;
      width: 36px;
      height: 36px;
      background: #2a2a4e;
      border: 1px solid #c8a82e66;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #e0d6a0;
      text-align: center;
      line-height: 1.1;
      overflow: hidden;
    }
    .prod-queue-item:first-child {
      border-color: #ffd700;
    }
    .prod-queue-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: #c8a82e;
      transition: width 0.15s ease;
    }
    /* Multi-select grid */
    .multi-select-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .multi-select-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      width: 52px;
    }
    .multi-select-unit .hp-bar-container {
      width: 44px;
      height: 4px;
      margin-top: 0;
    }
    .multi-select-label {
      font-size: 9px;
      color: #c8a82e;
      text-align: center;
      line-height: 1.1;
      max-width: 52px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <!-- Main menu overlay -->
  <div id="main-menu" style="
    position:absolute; inset:0; z-index:100;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#0a0a1a 0%,#1a1a3e 50%,#0a0a1a 100%);
    color:#e0d6a0; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
    <h1 style="font-size:48px; color:#c8a82e; text-shadow:2px 2px 6px rgba(0,0,0,0.8); margin-bottom:8px;">Warcraft Web</h1>
    <p style="font-size:14px; color:#888; margin-bottom:40px;">A Warcraft II-inspired RTS</p>
    <button id="btn-singleplayer" style="
      width:240px; padding:14px 0; margin:8px; font-size:18px; cursor:pointer;
      background:#2a2a4e; color:#e0d6a0; border:2px solid #c8a82e; border-radius:6px;
      transition:background 0.2s;" onmouseenter="this.style.background='#3a3a6e'" onmouseleave="this.style.background='#2a2a4e'">
      Single Player
    </button>
    <button id="btn-multiplayer" style="
      width:240px; padding:14px 0; margin:8px; font-size:18px; cursor:pointer;
      background:#2a2a4e; color:#e0d6a0; border:2px solid #c8a82e; border-radius:6px;
      transition:background 0.2s;" onmouseenter="this.style.background='#3a3a6e'" onmouseleave="this.style.background='#2a2a4e'">
      Multiplayer
    </button>
  </div>

  <!-- Lobby overlay (hidden by default) -->
  <div id="lobby-screen" style="
    position:absolute; inset:0; z-index:100; display:none;
    flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#0a0a1a 0%,#1a1a3e 50%,#0a0a1a 100%);
    color:#e0d6a0; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
    <h2 style="font-size:28px; color:#c8a82e; margin-bottom:8px;">Multiplayer Lobby</h2>
    <p id="lobby-status" style="font-size:13px; color:#888; margin-bottom:20px;">Connecting...</p>
    <div id="lobby-players" style="
      width:320px; min-height:100px; background:#1a1a2e; border:1px solid #c8a82e44;
      border-radius:6px; padding:12px; margin-bottom:20px; font-size:14px;"></div>
    <div style="display:flex; gap:12px;">
      <button id="btn-ready" style="
        padding:12px 32px; font-size:16px; cursor:pointer;
        background:#2a4e2a; color:#e0d6a0; border:2px solid #4a8a4a; border-radius:6px;">
        Ready
      </button>
      <button id="btn-lobby-back" style="
        padding:12px 32px; font-size:16px; cursor:pointer;
        background:#4e2a2a; color:#e0d6a0; border:2px solid #8a4a4a; border-radius:6px;">
        Back
      </button>
    </div>
  </div>

  <div id="game-container">
    <div id="resource-bar">
      <div class="resource-item">
        <div class="resource-icon gold-icon"></div>
        <span id="gold-count">0</span>
      </div>
      <div class="resource-item">
        <div class="resource-icon lumber-icon"></div>
        <span id="lumber-count">0</span>
      </div>
      <div class="resource-item">
        <span style="color:#a0c0ff;">Supply:</span>
        <span id="supply-count">0/0</span>
      </div>
      <div class="resource-item" style="margin-left: auto;">
        <span id="tick-count">Tick: 0</span>
      </div>
    </div>
    <div id="selection-box"></div>

    <!-- End-game overlay (hidden) -->
    <div id="endgame-overlay" style="
      position:absolute; inset:0; z-index:100; display:none;
      flex-direction:column; align-items:center; justify-content:center;
      background:rgba(0,0,0,0.75);
      color:#e0d6a0; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
      <h1 id="endgame-title" style="font-size:48px; color:#c8a82e; text-shadow:2px 2px 6px rgba(0,0,0,0.8); margin-bottom:16px;"></h1>
      <p id="endgame-subtitle" style="font-size:18px; color:#aaa; margin-bottom:32px;"></p>
      <button id="btn-endgame-menu" style="
        padding:14px 40px; font-size:18px; cursor:pointer;
        background:#2a2a4e; color:#e0d6a0; border:2px solid #c8a82e; border-radius:6px;">
        Back to Menu
      </button>
    </div>
    <div id="hud">
      <div id="minimap-panel">
        <canvas id="minimap-canvas" width="180" height="140"></canvas>
      </div>
      <div id="info-panel">
        <div class="unit-name" id="selected-name">No selection</div>
        <div class="unit-stats" id="selected-stats"></div>
      </div>
      <div id="action-panel"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
