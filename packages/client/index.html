<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warcraft Web</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
    }
    #game-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
    }
    #hud {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 160px;
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
      border-top: 2px solid #c8a82e;
      display: flex;
      align-items: stretch;
      z-index: 10;
      pointer-events: auto;
    }
    #resource-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 28px;
      background: linear-gradient(to bottom, #1a1a2e, #0f0f23);
      border-bottom: 1px solid #c8a82e;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 24px;
      z-index: 10;
      font-size: 13px;
      color: #e0d6a0;
      pointer-events: auto;
    }
    .resource-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .resource-icon {
      width: 14px;
      height: 14px;
      image-rendering: pixelated;
    }
    #hud-debug-group {
      font-size: 12px;
      color: #8888aa;
    }
    #fps-count { font-variant-numeric: tabular-nums; }
    #tick-count { font-variant-numeric: tabular-nums; }
    #minimap-panel {
      width: 200px;
      height: 100%;
      padding: 8px;
      border-right: 1px solid #c8a82e44;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #minimap-canvas {
      image-rendering: pixelated;
    }
    #info-panel {
      flex: 1;
      padding: 8px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    #info-panel .unit-name {
      font-size: 14px;
      font-weight: bold;
      color: #c8a82e;
      margin-bottom: 4px;
    }
    #info-panel .unit-stats {
      font-size: 12px;
      color: #a0a0c0;
    }
    #action-panel {
      width: 200px;
      height: 100%;
      padding: 8px;
      border-left: 1px solid #c8a82e44;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 4px;
    }
    .action-btn {
      background: #2a2a4e;
      border: 1px solid #c8a82e66;
      border-radius: 4px;
      color: #e0d6a0;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 2px;
      padding: 2px;
    }
    .action-btn:hover {
      background: #3a3a6e;
      border-color: #c8a82e;
    }
    .action-btn-active {
      background: #4a3a1e;
      border-color: #ffd700;
      box-shadow: 0 0 4px #ffd70066;
    }
    .order-hotkey {
      font-size: 8px;
      color: #888;
      font-weight: bold;
    }
    .order-name {
      font-size: 10px;
    }
    #selection-box {
      position: absolute;
      border: 1px solid #00ff00;
      background: rgba(0, 255, 0, 0.1);
      pointer-events: none;
      display: none;
      z-index: 5;
    }
    #event-log-wrapper {
      position: absolute;
      bottom: 170px;
      left: 8px;
      z-index: 9;
      pointer-events: auto;
    }
    #event-log {
      width: 38vw;
      min-width: 340px;
      max-width: 580px;
      height: 200px;
      display: flex;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 4px;
      overflow: hidden;
    }
    .event-log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 8px;
      background: rgba(0, 0, 0, 0.35);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }
    .event-log-title {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 11px;
      color: #8888aa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .event-log-close {
      background: none;
      border: none;
      color: #8888aa;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
    }
    .event-log-close:hover {
      color: #ccccee;
    }
    .event-log-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.15) transparent;
    }
    .event-log-scroll::-webkit-scrollbar {
      width: 4px;
    }
    .event-log-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
    }
    .event-log-line {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 12px;
      line-height: 1.5;
      padding: 2px 8px;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.9);
    }
    .event-log-clickable {
      cursor: pointer;
    }
    .event-log-clickable:hover {
      background: rgba(255, 255, 255, 0.08);
    }
    .event-log-time {
      color: #7a7a9a;
      margin-right: 6px;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }
    .event-log-sender {
      font-weight: bold;
      margin-right: 6px;
    }
    .event-log-sender::after {
      content: ':';
    }
    .event-log-msg {
      color: #d0d0e0;
    }
    #event-log-toggle {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 4px;
      color: #a0a0c0;
      font-size: 18px;
      width: 34px;
      height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    #event-log-toggle:hover {
      background: rgba(0, 0, 0, 0.75);
      color: #ccccee;
    }
    /* HP bar */
    .hp-bar-container {
      width: 100%;
      height: 8px;
      background: #1a1a2e;
      border: 1px solid #444;
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }
    .hp-bar-fill {
      height: 100%;
      transition: width 0.15s ease;
    }
    /* Production queue */
    .prod-queue {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      align-items: center;
    }
    .prod-queue-item {
      position: relative;
      width: 36px;
      height: 36px;
      background: #2a2a4e;
      border: 1px solid #c8a82e66;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #e0d6a0;
      text-align: center;
      line-height: 1.1;
      overflow: hidden;
    }
    .prod-queue-item:first-child {
      border-color: #ffd700;
    }
    .prod-queue-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: #c8a82e;
      transition: width 0.15s ease;
    }
    /* Multi-select grid */
    .multi-select-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .multi-select-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      width: 52px;
    }
    .multi-select-unit .hp-bar-container {
      width: 44px;
      height: 4px;
      margin-top: 0;
    }
    .multi-select-label {
      font-size: 9px;
      color: #c8a82e;
      text-align: center;
      line-height: 1.1;
      max-width: 52px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pause-menu-btn {
      width: 220px;
      padding: 12px 0;
      margin: 6px;
      font-size: 16px;
      cursor: pointer;
      background: #2a2a4e;
      color: #e0d6a0;
      border: 2px solid #c8a82e;
      border-radius: 6px;
      font-family: inherit;
      transition: background 0.15s;
    }
    .pause-menu-btn:hover {
      background: #3a3a6e;
    }
    #loading-screen {
      position: absolute;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0a0a1a 100%);
      color: #e0d6a0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #loading-screen h2 {
      font-size: 24px;
      color: #c8a82e;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
      margin-bottom: 24px;
    }
    #loading-bar-bg {
      width: 280px;
      height: 12px;
      background: #1a1a2e;
      border: 1px solid #c8a82e66;
      border-radius: 6px;
      overflow: hidden;
    }
    #loading-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #c8a82e, #ffd700);
      border-radius: 6px;
      transition: width 0.15s ease;
    }
    #loading-text {
      margin-top: 12px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <!-- Loading screen (visible on start, hidden when assets are ready) -->
  <div id="loading-screen">
    <h2>Loading...</h2>
    <div id="loading-bar-bg">
      <div id="loading-bar-fill"></div>
    </div>
    <p id="loading-text">0%</p>
  </div>

  <!-- Main menu overlay -->
  <div id="main-menu" style="
    position:absolute; inset:0; z-index:100;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#0a0a1a 0%,#1a1a3e 50%,#0a0a1a 100%);
    color:#e0d6a0; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
    <h1 style="font-size:48px; color:#c8a82e; text-shadow:2px 2px 6px rgba(0,0,0,0.8); margin-bottom:8px;">Warcraft Web</h1>
    <p style="font-size:14px; color:#888; margin-bottom:40px;">A Warcraft II-inspired RTS</p>
    <button id="btn-singleplayer" style="
      width:240px; padding:14px 0; margin:8px; font-size:18px; cursor:pointer;
      background:#2a2a4e; color:#e0d6a0; border:2px solid #c8a82e; border-radius:6px;
      transition:background 0.2s;" onmouseenter="this.style.background='#3a3a6e'" onmouseleave="this.style.background='#2a2a4e'">
      Single Player
    </button>
    <button id="btn-multiplayer" style="
      width:240px; padding:14px 0; margin:8px; font-size:18px; cursor:pointer;
      background:#2a2a4e; color:#e0d6a0; border:2px solid #c8a82e; border-radius:6px;
      transition:background 0.2s;" onmouseenter="this.style.background='#3a3a6e'" onmouseleave="this.style.background='#2a2a4e'">
      Multiplayer
    </button>
  </div>

  <!-- Faction selection overlay (hidden by default) -->
  <div id="faction-select" style="
    position:absolute; inset:0; z-index:100;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#0a0a1a 0%,#1a1a3e 50%,#0a0a1a 100%);
    color:#e0d6a0; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
    <h2 style="font-size:28px; color:#c8a82e; text-shadow:2px 2px 6px rgba(0,0,0,0.8); margin-bottom:32px;">Choose Your Faction</h2>
    <div style="display:flex; gap:32px;">
      <button id="btn-faction-humans" style="
        width:180px; padding:20px 0 16px; cursor:pointer;
        background:#2a2a4e; color:#e0d6a0; border:2px solid #c8a82e; border-radius:8px;
        display:flex; flex-direction:column; align-items:center; gap:12px;
        transition:background 0.2s, border-color 0.2s;"
        onmouseenter="this.style.background='#3a3a6e';this.style.borderColor='#e0c040'"
        onmouseleave="this.style.background='#2a2a4e';this.style.borderColor='#c8a82e'">
        <img id="img-faction-humans" alt="Humans" style="width:80px; height:80px; object-fit:contain; image-rendering:pixelated;">
        <span style="font-size:18px; font-weight:bold;">Humans</span>
      </button>
      <button id="btn-faction-orcs" style="
        width:180px; padding:20px 0 16px; cursor:pointer;
        background:#2a2a4e; color:#e0d6a0; border:2px solid #c8a82e; border-radius:8px;
        display:flex; flex-direction:column; align-items:center; gap:12px;
        transition:background 0.2s, border-color 0.2s;"
        onmouseenter="this.style.background='#3a3a6e';this.style.borderColor='#e0c040'"
        onmouseleave="this.style.background='#2a2a4e';this.style.borderColor='#c8a82e'">
        <img id="img-faction-orcs" alt="Horde" style="width:80px; height:80px; object-fit:contain; image-rendering:pixelated;">
        <span style="font-size:18px; font-weight:bold;">Horde</span>
      </button>
    </div>
    <div style="margin-top:28px; display:flex; align-items:center; gap:10px;">
      <label for="map-size-select" style="font-size:14px; color:#a0a0c0;">Map Size:</label>
      <select id="map-size-select" style="
        padding:6px 12px; font-size:14px; cursor:pointer;
        background:#2a2a4e; color:#e0d6a0; border:1px solid #c8a82e;
        border-radius:4px; font-family:inherit; outline:none;">
        <option value="small">Small</option>
        <option value="medium" selected>Medium</option>
        <option value="large">Large</option>
        <option value="extra_large">Extra Large</option>
        <option value="extra_extra_large">Extra Extra Large</option>
      </select>
    </div>
    <a id="btn-faction-back" href="#" style="
      margin-top:20px; font-size:14px; color:#888; text-decoration:none;
      transition:color 0.2s;"
      onmouseenter="this.style.color='#c8a82e'" onmouseleave="this.style.color='#888'">Back</a>
  </div>

  <!-- Lobby overlay (hidden by default) -->
  <div id="lobby-screen" style="
    position:absolute; inset:0; z-index:100; display:none;
    flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#0a0a1a 0%,#1a1a3e 50%,#0a0a1a 100%);
    color:#e0d6a0; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
    <h2 style="font-size:28px; color:#c8a82e; margin-bottom:8px;">Multiplayer Lobby</h2>
    <p id="lobby-status" style="font-size:13px; color:#888; margin-bottom:20px;">Connecting...</p>
    <div id="lobby-players" style="
      width:320px; min-height:100px; background:#1a1a2e; border:1px solid #c8a82e44;
      border-radius:6px; padding:12px; margin-bottom:20px; font-size:14px;"></div>
    <div style="display:flex; gap:12px;">
      <button id="btn-ready" style="
        padding:12px 32px; font-size:16px; cursor:pointer;
        background:#2a4e2a; color:#e0d6a0; border:2px solid #4a8a4a; border-radius:6px;">
        Ready
      </button>
      <button id="btn-lobby-back" style="
        padding:12px 32px; font-size:16px; cursor:pointer;
        background:#4e2a2a; color:#e0d6a0; border:2px solid #8a4a4a; border-radius:6px;">
        Back
      </button>
    </div>
  </div>

  <div id="game-container">
    <div id="resource-bar">
      <div class="resource-item">
        <img class="resource-icon" id="icon-gold" alt="Gold" title="Gold">
        <span id="gold-count" title="Gold">0</span>
      </div>
      <div class="resource-item">
        <img class="resource-icon" id="icon-lumber" alt="Lumber" title="Lumber">
        <span id="lumber-count">0</span>
      </div>
      <div class="resource-item">
        <span style="color:#a0c0ff;">Supply:</span>
        <span id="supply-count">0/0</span>
      </div>
      <div style="margin-left:auto; display:flex; align-items:center; gap:12px;">
        <div id="hud-debug-group" class="resource-item" style="display:none; gap:16px;">
          <span id="fps-count">FPS: 0</span>
          <span id="tick-count">Tick: 0</span>
          <span id="entity-count">Entities: 0</span>
        </div>
        <button id="btn-menu" style="
          background: #2a2a4e; color: #c8a82e; border: 1px solid #c8a82e66;
          border-radius: 3px; padding: 2px 10px; font-size: 11px; cursor: pointer;
          font-family: inherit; line-height: 1.4;
        ">Menu</button>
      </div>
    </div>
    <div id="selection-box"></div>

    <!-- Pause menu overlay (hidden) -->
    <div id="pause-overlay" style="
      position:absolute; inset:0; z-index:90; display:none;
      flex-direction:column; align-items:center; justify-content:center;
      background:rgba(0,0,0,0.7);
      color:#e0d6a0; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
      <h2 style="font-size:32px; color:#c8a82e; text-shadow:2px 2px 6px rgba(0,0,0,0.8); margin-bottom:32px;">Game Paused</h2>
      <button id="btn-resume" class="pause-menu-btn">Resume</button>
      <button id="btn-restart" class="pause-menu-btn">Restart</button>
      <button id="btn-quit" class="pause-menu-btn" style="border-color:#8a4a4a; color:#e09090;">Quit to Menu</button>

      <div id="pause-confirm" style="
        display:none; margin-top:24px; text-align:center;
        background:#1a1a2e; border:1px solid #c8a82e44; border-radius:6px; padding:16px 24px;">
        <p id="pause-confirm-msg" style="font-size:14px; margin-bottom:12px;"></p>
        <div style="display:flex; gap:12px; justify-content:center;">
          <button id="btn-confirm-yes" class="pause-menu-btn" style="width:100px; padding:8px 0; font-size:14px;">Yes</button>
          <button id="btn-confirm-no" class="pause-menu-btn" style="width:100px; padding:8px 0; font-size:14px;">No</button>
        </div>
      </div>
    </div>

    <!-- End-game overlay (hidden) -->
    <div id="endgame-overlay" style="
      position:absolute; inset:0; z-index:100; display:none;
      flex-direction:column; align-items:center; justify-content:center;
      background:rgba(0,0,0,0.75);
      color:#e0d6a0; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
      <h1 id="endgame-title" style="font-size:48px; color:#c8a82e; text-shadow:2px 2px 6px rgba(0,0,0,0.8); margin-bottom:16px;"></h1>
      <p id="endgame-subtitle" style="font-size:18px; color:#aaa; margin-bottom:32px;"></p>
      <button id="btn-endgame-menu" style="
        padding:14px 40px; font-size:18px; cursor:pointer;
        background:#2a2a4e; color:#e0d6a0; border:2px solid #c8a82e; border-radius:6px;">
        Back to Menu
      </button>
    </div>
    <div id="hud">
      <div id="minimap-panel">
        <canvas id="minimap-canvas" width="180" height="140"></canvas>
      </div>
      <div id="info-panel">
        <div class="unit-name" id="selected-name">No selection</div>
        <div class="unit-stats" id="selected-stats"></div>
      </div>
      <div id="action-panel"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
